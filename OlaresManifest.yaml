spec:
  versionName: '1.0.8'
  upgradeDescription: |
    v1.0.5: Upgraded to PyTorch 2.12.1+cu126 (sm_120 support for RTX 5090 Laptop) + torchao 0.17.0. Fixed "no kernel image available" CUDA error.
  fullDescription: |
    **Voxtral-4B-TTS** — Mistral's frontier text-to-speech model, int4 quantized for efficient GPU inference.

    **Model**
    Mistral Voxtral-4B-TTS-2603, quantized to int4 via torchao + HQQ algorithm. Near-lossless quality at 54% VRAM reduction (3.8 GB vs 8 GB BF16).

    **Inference Engine**
    Custom PyTorch inference with torch.compile optimization. 57 fps audio token generation on RTX 3090/4090/5090.

    **Key Features**
    - OpenAI-compatible API: /v1/audio/speech, /v1/models, /v1/audio/voices
    - 20 preset voices across 9 languages (EN, FR, ES, DE, IT, PT, NL, AR, HI)
    - 48 kHz audio output in WAV format
    - Long text auto-batching (1000 char segments)
    - Web dashboard for quick testing
    - Classifier-Free Guidance (cfg_alpha=1.2) for quality

    **Resource Usage**
    GPU: 1× NVIDIA (3.8 GB VRAM, RTX 3090/4090/5090)
    RAM: 4-12 GB
    CPU: 2-4 cores
    Disk: 15 GB (model pre-baked in image)

    **API Example**
    ```bash
    curl -X POST http://localhost:8000/v1/audio/speech \
      -H "Content-Type: application/json" \
      -d '{"input": "Hello world!", "voice": "neutral_female"}' \
      -o output.wav
    ```

    **Note:** Model weights are CC-BY-NC-4.0 (non-commercial use only).
